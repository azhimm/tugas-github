<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas 02 - Penyusunan Formulir</title>
    <style>
        @font-face { font-family: 'Asteroid'; src: url('Asteroid Blaster.ttf'); }
        body {
            margin: 0; padding: 100px 0 50px 0; display: flex; justify-content: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradient 7s ease infinite;
            color: white; font-family: 'Segoe UI', sans-serif;
        }
    
.top-nav {
    position: fixed;  
    top: 0;
    right: 0;
    width: 100%;
    display: flex;
    justify-content: flex-end; 
    padding: 20px 40px;
    z-index: 9999;      
    background: rgba(0, 0, 0, 0.1); 
    backdrop-filter: blur(5px);
    box-sizing: border-box;
}

.nav-link {
    font-family: 'Asteroid', sans-serif;
    color: white;
    text-decoration: none;
    font-size: 1rem;
    margin-left: 25px;
    transition: 0.3s;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.nav-link:hover {
    color: #ffde59;
    transform: scale(1.1);
    text-shadow: 0 0 15px #ffde59;
}


@media screen and (max-width: 768px) {
    .top-nav {
        justify-content: center;
        padding: 15px;
    }
    .nav-link {
        font-size: 0.8rem;
        margin: 0 10px;
    }
}
        .glass-form {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { font-family: 'Asteroid'; text-align: center; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.9); color: #333; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #ffde59; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { background: white; transform: scale(1.02); }
        @keyframes gradient { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="nav-link">TUGAS 1</a>
        <a href="Form.html" class="nav-link">TUGAS 2</a>
        <a href="Tugas 3.html" class="nav-link">TUGAS 3</a>
        <a href="Tugas 4.html" class="nav-link">TUGAS 4</a>
    </nav>
    <div class="glass-form">
    <h1>FORMULIR DATA</h1>
    
    <form action="https://script.google.com/macros/s/AKfycbwpjVnY1gv8UYWdVTX-kSVNoU6Eswfpuafc2E-4ufjSyK5NBCxJl7dDBGCoYuDNARvl/exec" method="POST">
        <h3>1. Data Diri</h3>
        <div class="input-group">
            <label>Nama</label>
            <input type="text" name="nama" placeholder="Masukkan nama lengkap">
        </div>
        <div class="input-group">
            <label>Tanggal Lahir</label>
            <input type="date" name="tanggal_lahir">  </div>
        <div class="input-group">
            <label>Alamat</label>
            <input type="text" name="alamat" placeholder="Alamat lengkap">
        </div>
        <div class="input-group">
            <label>No Telp/Whatsapp</label>
            <input type="tel" name="telepon" placeholder="08xxxx">
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="contoh@mail.com">
        </div>
        <div class="input-group">
            <label>Pendidikan Terakhir</label>
            <select name="pendidikan" required> <option value="">Pilih Pendidikan</option>
                <option>SMA/SMK</option>
                <option>Diploma (D3)</option>
                <option>Sarjana (S1)</option>
                <option>Magister (S2)</option>
            </select>
        </div>

        <h3>2. Data Bank</h3>
        <div class="input-group">
            <label>Nama Bank</label>
            <select name="bank" required>
                <option value="">Pilih Bank</option>
                <option>Bank Mandiri</option>
                <option>Bank BCA</option>
                <option>Bank BNI</option>
                <option>Bank BRI</option>
            </select>
        </div>
        <div class="input-group">
            <label>Nomor Rekening</label>
            <input type="number" name="rekening" placeholder="Masukkan nomor rekening">
        </div>

        <h3>3. Data Transaksi Keuangan</h3>
        <div class="input-group">
            <label>Tanggal Transaksi</label>
            <input type="date" name="tgl_transaksi">
        </div>
        <div class="input-group">
            <label>Uraian Transaksi</label>
            <input type="text" name="uraian" placeholder="Misal: Beli makan">
        </div>
         <div class="input-group">
            <label>Harga/total Harga</label>
            <input type="text" name="harga">
        </div>
        <div class="input-group">
            <label>Jenis Transaksi</label>
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <input type="radio" name="jenis" id="debet" value="debet"> <label for="debet">Debet</label>
                <input type="radio" name="jenis" id="kredit" value="kredit"> <label for="kredit">Kredit</label>
            </div> 
        </div>
        <button type="submit" class="btn-submit">SIMPAN DATA</button>
    </form>
</div>
</body>
</html>
