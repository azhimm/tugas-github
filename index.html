    <!DOCTYPE html>
<!DOCTYPE html>
<html lang="id">
<head>
<style>
        @font-face { font-family: 'Asteroid'; src: url('Asteroid Blaster.ttf'); }
        body {
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradient 7s ease infinite; color: rgb(255, 255, 255); font-family: 'asteroid' sans-serif;
        }
        .top-nav {
    position: fixed;
    top: -20px;
    right: 30px;
    display: flex;
    gap: 20px; 
    z-index: 1000;
}
.nav-link {
    text-decoration: none;
    color: white;
    font-family: 'Asteroid', sans-serif;
    font-size: 1.2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: 0.4s;
}
.nav-link::after {
    content: '';
    width: 0;
    height: 2px;
    background: #ffde59;
    transition: 0.4s;
    margin-top: 5px;
}

.nav-link:hover {
    text-shadow: 0 0 15px #fff, 0 0 25px #ffde59;
    transform: translateY(-3px);
}

.nav-link:hover::after {
    width: 100%;
}
    
        @keyframes gradient { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }
        .glass {
            background: rgba(224, 215, 215, 0.1); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 50px; text-align: center; border: 1px solid rgba(6, 0, 0, 0.2);
        }
        h1 { font-family: 'Asteroid'; font-size: 4rem; text-shadow: 0 0 20px rgba(247, 246, 246, 0.5); margin: 0; }
        p { font-family: 'Asteroid'; font-size: 1rem; text-shadow: 0 0 10px rgba(0, 0, 0, 0.5); margin: 0;}
        nav { margin-top: 30px; }
        nav a { font-family: 'Asteroid', sans-serif;color: rgb(255, 255, 255);
            text-decoration: none;
            font-size: 1.2rem;
            margin: 10px;
            display: inline-block;
            transition: 0.4s;}
        nav a:hover { transform: rotate(10deg) scale(1.3);color: white; }

</style>
</head>

</body>
