<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - My Web</title>
    <style>
        @font-face { font-family: 'Asteroid'; src: url('Asteroid Blaster.ttf'); }
        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradient 7s ease infinite; color: white; font-family: 'Asteroid', sans-serif;
            overflow: hidden;
        }
        @keyframes gradient { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }
        
        
.top-nav {
    position: fixed;    
    top: 0;
    right: 0;
    width: 100%;
    display: flex;
    justify-content: flex-end; 
    padding: 20px 40px;
    z-index: 9999;      
    background: rgba(0, 0, 0, 0.1); 
    backdrop-filter: blur(5px);
    box-sizing: border-box;
}

.nav-link {
    font-family: 'Asteroid', sans-serif;
    color: white;
    text-decoration: none;
    font-size: 1rem;
    margin-left: 25px;
    transition: 0.3s;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.nav-link:hover {
    color: #ffde59; 
    transform: scale(1.1);
    text-shadow: 0 0 15px #ffde59;
}


@media screen and (max-width: 768px) {
    .top-nav {
        justify-content: center; 
        padding: 15px;
    }
    .nav-link {
        font-size: 0.8rem;
        margin: 0 10px;
    }
}


        .glass {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 50px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
         h1 { font-size: 4rem; margin: 0; text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
        p { font-size: 1rem; margin-top: 10px; opacity: 0.8; }
        nav { margin-top: 30px; }
        nav a { font-family: 'Asteroid', sans-serif;color: rgb(255, 255, 255);
            text-decoration: none;
            font-size: 1.2rem;
            margin: 10px;
            display: inline-block;
            transition: 0.4s;}
        nav a:hover { transform: rotate(10deg) scale(1.3);color: white; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="nav-link">TUGAS 1</a>
        <a href="Form.html" class="nav-link">TUGAS 2</a>
        <a href="Tugas 3.html" class="nav-link">TUGAS 3</a>
        <a href="Tugas 4.html" class="nav-link">TUGAS 4</a>
    </nav>
    <div class="glass">
        <h1>WELCOME</h1>
        <p>ini adalah website percobaan animasi serta gradasi warna pertama saya</p>
    </div>
    <nav>
            <a href="biodata.html">BIO</a> |
            <a href="galery.html">MY GALLERY</a>
        </nav>
</body>
</html>
